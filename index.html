<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ระบบวางแผนการผลิต | Production Planning</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:    #0a0f1e;
      --bg-panel:   #111827;
      --bg-card:    #1a2235;
      --bg-hover:   #1e2d45;
      --border:     #1e3a5f;
      --border-dim: #253347;
      --blue:       #3b82f6;
      --blue-dim:   #1d4ed8;
      --blue-glow:  rgba(59,130,246,0.15);
      --green:      #10b981;
      --red:        #ef4444;
      --amber:      #f59e0b;
      --gray:       #6b7280;
      --text-hi:    #f1f5f9;
      --text-mid:   #94a3b8;
      --text-lo:    #4b6280;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Sarabun', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg-base);
      color: var(--text-hi);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ─── scrollbar ─── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ─── layout ─── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ─── header ─── */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,15,30,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      height: 58px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--blue), var(--blue-dim));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      box-shadow: 0 0 16px var(--blue-glow);
    }
    .brand-name { font-weight: 700; font-size: 15px; color: var(--text-hi); letter-spacing: 0.02em; }
    .brand-sub  { font-size: 10px; color: var(--text-lo); font-family: var(--mono); letter-spacing: 0.08em; text-transform: uppercase; }

    nav { display: flex; gap: 4px; }
    .nav-btn {
      padding: 6px 16px; border-radius: 6px; border: none; cursor: pointer;
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      background: transparent; color: var(--text-mid);
      transition: background .15s, color .15s;
    }
    .nav-btn:hover { background: var(--bg-card); color: var(--text-hi); }
    .nav-btn.active {
      background: var(--blue); color: #fff;
      box-shadow: 0 0 12px var(--blue-glow);
    }

    /* ─── main ─── */
    main { flex: 1; padding: 28px; max-width: 1180px; width: 100%; margin: 0 auto; }

    /* ─── views ─── */
    .view { display: none; animation: fadeIn .2s ease; }
    .view.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ─── stat cards ─── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      border-radius: 14px;
      padding: 22px 24px;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }
    .stat-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card .icon { font-size: 26px; margin-bottom: 10px; }
    .stat-card .val  { font-size: 38px; font-weight: 700; line-height: 1; font-family: var(--mono); }
    .stat-card .lbl  { font-size: 12px; color: var(--text-mid); margin-top: 6px; font-weight: 500; }

    /* ─── panel ─── */
    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      border-radius: 14px;
      padding: 22px 24px;
    }
    .panel-title { font-weight: 600; font-size: 14px; color: var(--text-hi); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .panel-title::before { content: ''; display: block; width: 3px; height: 16px; background: var(--blue); border-radius: 2px; }

    /* ─── progress rows ─── */
    .prog-row {
      display: grid;
      grid-template-columns: 90px 1fr 124px 52px;
      gap: 16px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-dim);
    }
    .prog-row:last-child { border-bottom: none; }
    .wo-id  { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--blue); }
    .wo-name { font-size: 13px; color: var(--text-mid); margin-bottom: 6px; }
    .bar-bg { height: 7px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
    .pct { font-family: var(--mono); font-weight: 700; font-size: 13px; text-align: right; }

    /* ─── badge ─── */
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      padding: 4px 11px; border-radius: 20px;
      white-space: nowrap;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ─── toolbar ─── */
    .toolbar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
    }
    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border-dim);
      font-size: 12px; font-weight: 500; cursor: pointer;
      background: var(--bg-panel); color: var(--text-mid);
      font-family: var(--sans);
      transition: background .15s, color .15s, border-color .15s;
    }
    .filter-btn:hover { background: var(--bg-card); color: var(--text-hi); }
    .filter-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    .btn-add {
      padding: 8px 20px; background: var(--blue); border: none;
      border-radius: 8px; color: #fff; cursor: pointer;
      font-family: var(--sans); font-weight: 600; font-size: 13px;
      box-shadow: 0 0 14px var(--blue-glow);
      transition: background .15s, box-shadow .15s;
    }
    .btn-add:hover { background: var(--blue-dim); }

    /* ─── add form ─── */
    .add-form {
      background: var(--bg-panel);
      border: 1px solid var(--blue);
      border-radius: 14px;
      padding: 22px 24px;
      margin-bottom: 16px;
      display: none;
      box-shadow: 0 0 28px var(--blue-glow);
      animation: fadeIn .2s ease;
    }
    .add-form.open { display: block; }
    .form-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
    .form-group {}
    .form-label { font-size: 11px; color: var(--text-lo); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .form-input {
      width: 100%; padding: 8px 11px;
      background: var(--bg-base); border: 1px solid var(--border-dim);
      border-radius: 8px; color: var(--text-hi);
      font-family: var(--sans); font-size: 13px;
      transition: border-color .15s;
    }
    .form-input:focus { outline: none; border-color: var(--blue); }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel {
      padding: 8px 20px; background: transparent;
      border: 1px solid var(--border-dim); border-radius: 8px;
      color: var(--text-mid); cursor: pointer; font-family: var(--sans);
      transition: border-color .15s, color .15s;
    }
    .btn-cancel:hover { border-color: var(--text-mid); color: var(--text-hi); }
    .btn-save {
      padding: 8px 22px; background: var(--blue); border: none;
      border-radius: 8px; color: #fff; cursor: pointer;
      font-family: var(--sans); font-weight: 600;
    }

    /* ─── order cards ─── */
    .order-list { display: flex; flex-direction: column; gap: 8px; }
    .order-card {
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      border-radius: 12px; overflow: hidden;
      transition: border-color .15s;
    }
    .order-card.open { border-color: var(--blue); box-shadow: 0 0 18px var(--blue-glow); }
    .order-header {
      padding: 14px 20px; cursor: pointer;
      display: grid;
      grid-template-columns: 90px 1fr 124px 88px 56px 28px;
      gap: 14px; align-items: center;
    }
    .order-header:hover { background: var(--bg-hover); }
    .order-name  { font-weight: 600; font-size: 14px; color: var(--text-hi); }
    .order-meta  { font-size: 11px; color: var(--text-lo); margin-top: 2px; font-family: var(--mono); }
    .chevron { color: var(--text-lo); text-align: center; font-size: 10px; transition: transform .2s; }
    .order-card.open .chevron { transform: rotate(180deg); }

    .order-detail {
      border-top: 1px solid var(--border-dim);
      padding: 18px 20px;
      background: var(--bg-base);
      display: none;
    }
    .order-card.open .order-detail { display: block; }
    .detail-meta { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 20px; }
    .detail-key { font-size: 10px; color: var(--text-lo); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .detail-val { font-weight: 600; font-size: 13px; }
    .progress-ctrl { }
    .progress-label { font-size: 11px; color: var(--text-lo); margin-bottom: 10px; }
    .range-row { display: flex; gap: 14px; align-items: center; }
    input[type=range] { flex: 1; accent-color: var(--blue); cursor: pointer; height: 6px; }
    .range-num {
      width: 58px; padding: 6px 8px;
      background: var(--bg-panel); border: 1px solid var(--border-dim);
      border-radius: 7px; color: var(--text-hi);
      font-family: var(--mono); text-align: center; font-size: 13px;
    }

    /* ─── gantt ─── */
    .gantt-wrap {
      background: var(--bg-panel);
      border: 1px solid var(--border-dim);
      border-radius: 14px; overflow: hidden;
    }
    .gantt-head { display: grid; grid-template-columns: 160px 1fr; border-bottom: 1px solid var(--border-dim); }
    .gantt-head-label { padding: 10px 16px; font-size: 11px; color: var(--text-lo); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; border-right: 1px solid var(--border-dim); }
    .gantt-days { display: grid; grid-template-columns: repeat(15,1fr); padding: 0 8px; }
    .gantt-day { text-align: center; padding: 10px 0; font-size: 11px; color: var(--text-lo); font-family: var(--mono); }
    .gantt-day.today { color: var(--blue); font-weight: 700; }
    .gantt-row { display: grid; grid-template-columns: 160px 1fr; border-bottom: 1px solid var(--border-dim); }
    .gantt-row:last-child { border-bottom: none; }
    .gantt-row-label { padding: 12px 16px; border-right: 1px solid var(--border-dim); }
    .gantt-row-id   { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--blue); }
    .gantt-row-name { font-size: 11px; color: var(--text-mid); margin-top: 3px; }
    .gantt-area { position: relative; height: 52px; padding: 0 8px; }
    .gantt-bar {
      position: absolute; top: 12px; height: 28px;
      border-radius: 7px; overflow: hidden;
      display: flex; align-items: center; min-width: 32px;
    }
    .gantt-bar-inner { height: 100%; background: rgba(255,255,255,0.18); position: absolute; left: 0; top: 0; border-radius: 7px; }
    .gantt-bar-pct { font-size: 11px; font-weight: 700; color: #fff; position: relative; z-index: 1; padding-left: 9px; font-family: var(--mono); }
    .gantt-today-line {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: rgba(59,130,246,0.4);
    }
    .gantt-footer { text-align: center; padding: 10px; font-size: 11px; color: var(--blue); border-top: 1px solid var(--border-dim); font-family: var(--mono); }

    /* ─── responsive ─── */
    @media (max-width: 768px) {
      main { padding: 16px; }
      .stat-grid { grid-template-columns: repeat(2,1fr); }
      .order-header { grid-template-columns: 80px 1fr 28px; }
      .order-header > *:nth-child(3),
      .order-header > *:nth-child(4),
      .order-header > *:nth-child(5) { display: none; }
      .form-grid { grid-template-columns: 1fr 1fr; }
      header { padding: 0 16px; }
      .brand-sub { display: none; }
    }
    @media (max-width: 480px) {
      .stat-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
      .form-grid { grid-template-columns: 1fr; }
      nav .nav-btn { padding: 6px 10px; font-size: 12px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="brand">
      <div class="brand-icon">⚙️</div>
      <div>
        <div class="brand-name">ระบบวางแผนการผลิต</div>
        <div class="brand-sub">Production Planning & Tracking</div>
      </div>
    </div>
    <nav>
      <button class="nav-btn active" onclick="switchView('dashboard')">📊 ภาพรวม</button>
      <button class="nav-btn" onclick="switchView('orders')">📋 ใบงาน</button>
      <button class="nav-btn" onclick="switchView('gantt')">📅 Gantt</button>
    </nav>
  </header>

  <main>

    <!-- ── DASHBOARD ── -->
    <div id="view-dashboard" class="view active">
      <div class="stat-grid">
        <div class="stat-card" style="background:linear-gradient(135deg,#0d1f3c,#111827);border-color:#1e3a5f">
          <div class="icon">📋</div>
          <div class="val" id="s-total" style="color:#60a5fa">5</div>
          <div class="lbl">ใบงานทั้งหมด</div>
        </div>
        <div class="stat-card" style="background:linear-gradient(135deg,#0d1f3c,#111827);border-color:#1e3a5f">
          <div class="icon">🔧</div>
          <div class="val" id="s-active" style="color:#93c5fd">2</div>
          <div class="lbl">กำลังผลิต</div>
        </div>
        <div class="stat-card" style="background:linear-gradient(135deg,#052e1c,#111827);border-color:#065f46">
          <div class="icon">✅</div>
          <div class="val" id="s-done" style="color:#34d399">1</div>
          <div class="lbl">เสร็จสิ้น</div>
        </div>
        <div class="stat-card" style="background:linear-gradient(135deg,#2d0808,#111827);border-color:#7f1d1d">
          <div class="icon">⚠️</div>
          <div class="val" id="s-late" style="color:#f87171">1</div>
          <div class="lbl">ล่าช้า</div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-title">ความคืบหน้าใบงาน</div>
        <div id="dash-list"></div>
      </div>
    </div>

    <!-- ── ORDERS ── -->
    <div id="view-orders" class="view">
      <div class="toolbar">
        <div class="filter-group" id="filter-btns">
          <button class="filter-btn active" onclick="setFilter('ทั้งหมด')">ทั้งหมด</button>
          <button class="filter-btn" onclick="setFilter('กำลังผลิต')">กำลังผลิต</button>
          <button class="filter-btn" onclick="setFilter('รอผลิต')">รอผลิต</button>
          <button class="filter-btn" onclick="setFilter('เสร็จสิ้น')">เสร็จสิ้น</button>
          <button class="filter-btn" onclick="setFilter('ล่าช้า')">ล่าช้า</button>
        </div>
        <button class="btn-add" onclick="toggleAddForm()">＋ เพิ่มใบงาน</button>
      </div>

      <div class="add-form" id="add-form">
        <div class="panel-title" style="margin-bottom:16px">เพิ่มใบงานใหม่</div>
        <div class="form-grid">
          <div class="form-group"><div class="form-label">รหัสใบงาน</div><input class="form-input" id="f-id" placeholder="WO-006" /></div>
          <div class="form-group"><div class="form-label">ชื่อสินค้า</div><input class="form-input" id="f-product" placeholder="ชื่อสินค้า" /></div>
          <div class="form-group"><div class="form-label">จำนวน</div><input class="form-input" id="f-qty" type="number" placeholder="100" /></div>
          <div class="form-group"><div class="form-label">เครื่องจักร</div><input class="form-input" id="f-machine" placeholder="เครื่อง #5" /></div>
          <div class="form-group"><div class="form-label">วันเริ่มต้น</div><input class="form-input" id="f-start" type="date" /></div>
          <div class="form-group"><div class="form-label">วันสิ้นสุด</div><input class="form-input" id="f-end" type="date" /></div>
          <div class="form-group">
            <div class="form-label">ความสำคัญ</div>
            <select class="form-input" id="f-priority">
              <option>สูง</option><option selected>ปกติ</option><option>ต่ำ</option>
            </select>
          </div>
          <div class="form-group">
            <div class="form-label">หน่วย</div>
            <select class="form-input" id="f-unit">
              <option>ชิ้น</option><option>ชุด</option><option>กล่อง</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-cancel" onclick="toggleAddForm()">ยกเลิก</button>
          <button class="btn-save" onclick="addOrder()">บันทึก</button>
        </div>
      </div>

      <div class="order-list" id="orders-list"></div>
    </div>

    <!-- ── GANTT ── -->
    <div id="view-gantt" class="view">
      <div class="panel-title" style="margin-bottom:16px">📅 Gantt Chart — มีนาคม 2026</div>
      <div class="gantt-wrap">
        <div class="gantt-head">
          <div class="gantt-head-label">ใบงาน</div>
          <div class="gantt-days" id="gantt-days"></div>
        </div>
        <div id="gantt-rows"></div>
        <div class="gantt-footer">📍 วันนี้: 4 มีนาคม 2026</div>
      </div>
    </div>

  </main>
</div>

<script>
// ─── DATA ───────────────────────────────────────
var orders = [
  { id:"WO-001", product:"ชิ้นส่วน A-100", qty:500,  unit:"ชิ้น", start:"2026-03-01", end:"2026-03-05", progress:80,  status:"กำลังผลิต", priority:"สูง",  machine:"เครื่อง #1" },
  { id:"WO-002", product:"ประกอบ B-200",   qty:200,  unit:"ชุด",  start:"2026-03-03", end:"2026-03-08", progress:40,  status:"กำลังผลิต", priority:"ปกติ", machine:"เครื่อง #2" },
  { id:"WO-003", product:"ชิ้นส่วน C-300", qty:1000, unit:"ชิ้น", start:"2026-03-06", end:"2026-03-12", progress:0,   status:"รอผลิต",    priority:"ต่ำ",  machine:"เครื่อง #3" },
  { id:"WO-004", product:"โมดูล D-400",    qty:50,   unit:"ชุด",  start:"2026-02-25", end:"2026-03-02", progress:100, status:"เสร็จสิ้น", priority:"สูง",  machine:"เครื่อง #1" },
  { id:"WO-005", product:"ชิ้นส่วน E-500", qty:300,  unit:"ชิ้น", start:"2026-03-04", end:"2026-03-09", progress:15,  status:"ล่าช้า",    priority:"สูง",  machine:"เครื่อง #4" },
];

var SC = {
  "กำลังผลิต": { bg:"#1e40af", text:"#93c5fd", dot:"#3b82f6" },
  "รอผลิต":    { bg:"#374151", text:"#d1d5db", dot:"#6b7280" },
  "เสร็จสิ้น": { bg:"#065f46", text:"#6ee7b7", dot:"#10b981" },
  "ล่าช้า":    { bg:"#7f1d1d", text:"#fca5a5", dot:"#ef4444" },
};
var PC = { "สูง":"#ef4444","ปกติ":"#f59e0b","ต่ำ":"#6b7280" };
var BC = { "ล่าช้า":"#ef4444","เสร็จสิ้น":"#10b981","กำลังผลิต":"#3b82f6","รอผลิต":"#475569" };

var currentFilter = "ทั้งหมด";
var selectedId = null;

// ─── NAV ────────────────────────────────────────
function switchView(v) {
  document.querySelectorAll('.view').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(btn, i){
    btn.classList.toggle('active', ['dashboard','orders','gantt'][i] === v);
  });
  if (v === 'dashboard') renderDash();
  if (v === 'orders')    renderOrders();
  if (v === 'gantt')     renderGantt();
}

// ─── DASHBOARD ──────────────────────────────────
function renderDash() {
  document.getElementById('s-total').textContent  = orders.length;
  document.getElementById('s-active').textContent = orders.filter(function(o){ return o.status==='กำลังผลิต'; }).length;
  document.getElementById('s-done').textContent   = orders.filter(function(o){ return o.status==='เสร็จสิ้น'; }).length;
  document.getElementById('s-late').textContent   = orders.filter(function(o){ return o.status==='ล่าช้า'; }).length;

  var html = '';
  orders.forEach(function(o){
    var sc = SC[o.status], bc = BC[o.status]||'#475569';
    var pctColor = o.progress===100 ? '#34d399' : '#f1f5f9';
    html += '<div class="prog-row">' +
      '<div class="wo-id">' + o.id + '</div>' +
      '<div>' +
        '<div class="wo-name">' + o.product + '</div>' +
        '<div class="bar-bg"><div class="bar-fill" style="width:' + o.progress + '%;background:' + bc + '"></div></div>' +
      '</div>' +
      '<span class="badge" style="background:' + sc.bg + ';color:' + sc.text + '">' +
        '<span class="dot" style="background:' + sc.dot + '"></span>' + o.status + '</span>' +
      '<div class="pct" style="color:' + pctColor + '">' + o.progress + '%</div>' +
    '</div>';
  });
  document.getElementById('dash-list').innerHTML = html;
}

// ─── ORDERS ─────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.textContent.trim() === f);
  });
  renderOrders();
}

function renderOrders() {
  var list = currentFilter === 'ทั้งหมด' ? orders : orders.filter(function(o){ return o.status===currentFilter; });
  var html = '';
  list.forEach(function(o){
    var sc = SC[o.status], bc = BC[o.status]||'#475569';
    var isOpen = selectedId === o.id;
    html += '<div class="order-card' + (isOpen?' open':'') + '" id="card-' + o.id + '">' +
      '<div class="order-header" onclick="toggleCard(\'' + o.id + '\')">' +
        '<div class="wo-id">' + o.id + '</div>' +
        '<div><div class="order-name">' + o.product + '</div><div class="order-meta">' + o.qty.toLocaleString() + ' ' + o.unit + ' · ' + o.machine + '</div></div>' +
        '<span class="badge" style="background:' + sc.bg + ';color:' + sc.text + '"><span class="dot" style="background:' + sc.dot + '"></span>' + o.status + '</span>' +
        '<div><div class="bar-bg" style="height:5px"><div class="bar-fill" style="width:' + o.progress + '%;background:' + bc + ';height:100%"></div></div></div>' +
        '<div class="wo-id" style="text-align:right">' + o.progress + '%</div>' +
        '<div class="chevron">▼</div>' +
      '</div>' +
      '<div class="order-detail">' +
        '<div class="detail-meta">' +
          '<div><div class="detail-key">วันเริ่มต้น</div><div class="detail-val" style="color:#cbd5e1">' + o.start + '</div></div>' +
          '<div><div class="detail-key">วันสิ้นสุด</div><div class="detail-val" style="color:#cbd5e1">' + o.end + '</div></div>' +
          '<div><div class="detail-key">ความสำคัญ</div><div class="detail-val" style="color:' + PC[o.priority] + '">' + o.priority + '</div></div>' +
        '</div>' +
        '<div class="progress-ctrl">' +
          '<div class="progress-label">อัปเดตความคืบหน้า (' + o.progress + '%)</div>' +
          '<div class="range-row">' +
            '<input type="range" min="0" max="100" value="' + o.progress + '" oninput="updateProg(\'' + o.id + '\',+this.value)" />' +
            '<input class="range-num" type="number" min="0" max="100" value="' + o.progress + '" onchange="updateProg(\'' + o.id + '\',+this.value)" />' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  });
  document.getElementById('orders-list').innerHTML = html;
}

function toggleCard(id) {
  selectedId = selectedId === id ? null : id;
  renderOrders();
}

function updateProg(id, val) {
  var p = Math.max(0, Math.min(100, val));
  orders = orders.map(function(o){
    if (o.id !== id) return o;
    var status = p===100 ? 'เสร็จสิ้น' : p>0 ? 'กำลังผลิต' : o.status;
    return Object.assign({}, o, { progress:p, status:status });
  });
  renderOrders();
  if (document.getElementById('view-dashboard').classList.contains('active')) renderDash();
}

function toggleAddForm() {
  document.getElementById('add-form').classList.toggle('open');
}

function addOrder() {
  var id = document.getElementById('f-id').value.trim();
  var product = document.getElementById('f-product').value.trim();
  if (!id || !product) { alert('กรุณากรอกรหัสใบงานและชื่อสินค้า'); return; }
  orders.push({
    id: id, product: product,
    qty: parseInt(document.getElementById('f-qty').value)||0,
    unit: document.getElementById('f-unit').value,
    start: document.getElementById('f-start').value,
    end: document.getElementById('f-end').value,
    progress: 0, status: 'รอผลิต',
    priority: document.getElementById('f-priority').value,
    machine: document.getElementById('f-machine').value,
  });
  toggleAddForm();
  ['f-id','f-product','f-qty','f-machine','f-start','f-end'].forEach(function(i){ document.getElementById(i).value=''; });
  renderOrders();
}

// ─── GANTT ──────────────────────────────────────
function renderGantt() {
  var TODAY = 4;
  var dHtml = '';
  for (var d = 1; d <= 15; d++) {
    dHtml += '<div class="gantt-day' + (d===TODAY?' today':'') + '">' + d + '</div>';
  }
  document.getElementById('gantt-days').innerHTML = dHtml;

  var rHtml = '';
  orders.forEach(function(o, idx) {
    var s = new Date(o.start).getDate();
    var e = new Date(o.end).getDate();
    var left  = ((Math.max(s,1)-1)/15)*100;
    var width = ((Math.min(e,15)-Math.max(s,1)+1)/15)*100;
    var bc = BC[o.status]||'#475569';
    var bg = idx%2===0 ? 'var(--bg-panel)' : 'var(--bg-base)';
    var todayPct = ((TODAY-1)/15)*100;
    rHtml += '<div class="gantt-row" style="background:' + bg + '">' +
      '<div class="gantt-row-label">' +
        '<div class="gantt-row-id">' + o.id + '</div>' +
        '<div class="gantt-row-name">' + o.product.slice(0,16) + '</div>' +
      '</div>' +
      '<div class="gantt-area">' +
        '<div class="gantt-today-line" style="left:calc(8px + ' + todayPct + '%)"></div>' +
        '<div class="gantt-bar" style="left:calc(8px + ' + left + '%);width:' + width + '%;background:' + bc + '">' +
          '<div class="gantt-bar-inner" style="width:' + o.progress + '%"></div>' +
          '<span class="gantt-bar-pct">' + o.progress + '%</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  });
  document.getElementById('gantt-rows').innerHTML = rHtml;
}

// ─── INIT ────────────────────────────────────────
renderDash();
</script>
</body>
</html>
